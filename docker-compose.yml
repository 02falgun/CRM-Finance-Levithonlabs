version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: levithon-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: levithon_crm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - levithon-network

  redis:
    image: redis:7-alpine
    container_name: levithon-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - levithon-network

volumes:
  postgres_data:
  redis_data:

networks:
  levithon-network:
    driver: bridge
